kind = "web"
previewPath = "/"
title = "Buchstaben Lernen"
version = "1.0.0"
id = "artifacts/buchstaben-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21673

[services.development]
run = "pnpm --filter @workspace/buchstaben-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buchstaben-app", "run", "build" ]
publicDir = "artifacts/buchstaben-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21673"
BASE_PATH = "/"
